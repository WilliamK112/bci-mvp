name: ci

on:
  push:
  pull_request:

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Syntax check
        run: |
          python -m py_compile src/*.py api/*.py app/*.py
      - name: Smoke import
        run: |
          python - <<'PY'
          import src.preprocess
          import src.infer
          print('imports ok')
          PY
      - name: Unit tests
        run: |
          python -m unittest -q tests/test_streaming_unittest.py tests/test_infer_fallback_unittest.py
